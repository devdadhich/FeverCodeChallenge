server:
  port: 8080
  tomcat:
    threads:
      max: 200             # Handle high concurrency (default is 200, explicit for clarity)
      min-spare: 20        # Keep warm threads ready for traffic bursts
    accept-count: 100      # Queue up to 100 connections when all threads are busy

spring:
  datasource:
    url: jdbc:h2:file:./data/feverdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20        # Match expected concurrent DB readers
      minimum-idle: 5              # Keep connections warm
      connection-timeout: 5000     # Fail fast if pool is exhausted
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50           # Batch INSERT/UPDATE during sync
        order_inserts: true        # Group inserts for batch efficiency
        order_updates: true        # Group updates for batch efficiency
  h2:
    console:
      enabled: true

# Provider sync configuration
provider:
  url: https://provider.code-challenge.feverup.com/api/events
  sync-interval-ms: 30000       # Sync every 30 seconds
  connect-timeout-ms: 5000      # 5s connection timeout
  read-timeout-ms: 10000        # 10s read timeout
  max-retries: 3                # Retry up to 3 times on failure
  retry-delay-ms: 2000          # 2s between retries

logging:
  level:
    com.fever.challenge: INFO

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always         # Show DB and disk health details
