spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

provider:
  url: http://localhost:9999/api/events
  sync-interval-ms: 999999999
  connect-timeout-ms: 2000
  read-timeout-ms: 2000
  max-retries: 1
  retry-delay-ms: 100
